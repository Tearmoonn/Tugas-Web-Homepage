<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <title>Gallery - Personal Homepage</title>
</head>
<body style="background-color: #1c212b; color: #e0f2fe; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; line-height: 1.6;">

    <!-- HEADER & NAVIGASI -->

        <div style="text-align: left;">
            <h1 style="margin: 0; font-size: 2rem; color: #ffffff; text-shadow: 0 0 10px rgba(0, 243, 255, 0.2);">
                Personal Homepage<span style="color: #00f3ff; text-shadow: 0 0 15px #00f3ff;">.</span>
            </h1>
            <p style="margin: 5px 0 0 0; color: #7dd3fc; font-size: 0.85rem; padding: 4px 12px; border: 1px solid rgba(125, 211, 252, 0.3); border-radius: 20px; display: inline-block;">
                Mahasiswa | Movie Enthusiast | Tech Enthusiast
            </p>
        </div>
        
        <nav style="display: flex; gap: 20px; align-items: center;">
            <a href="index.html" style="text-decoration: none; color: #e0f2fe; font-weight: bold; padding: 8px 15px;">Home</a>
            <a href="gallery.html" style="text-decoration: none; color: #1c212b; background-color: #00f3ff; padding: 8px 25px; border-radius: 30px; font-weight: bold; box-shadow: 0 0 15px rgba(0, 243, 255, 0.5);">Gallery</a>
            <a href="blog.html" style="text-decoration: none; color: #e0f2fe; font-weight: bold; padding: 8px 15px;">Blog</a>
            <a href="contact.html" style="text-decoration: none; color: #e0f2fe; font-weight: bold; padding: 8px 15px;">Contact</a>
        </nav>
    </header>

    <!-- KONTEN UTAMA GALLERY -->
    <main style="max-width: 1000px; margin: 0 auto; padding: 40px 20px; min-height: 65vh;">
        <section>
            <h2 style="color: #00f3ff; text-align: center; font-size: 2.5rem; margin-top: 0; margin-bottom: 40px;">My Gallery</h2>
            <div style="display: flex; justify-content: center; gap: 30px; flex-wrap: wrap;">
                
                <figure style="margin: 0; text-align: center; background-color: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; border: 1px solid #1e3a8a; box-shadow: 0 5px 15px rgba(0,0,0,0.5);">
                    <img src="[https://placehold.co/400x250?text=Foto+Kegiatan+1](https://placehold.co/400x250?text=Foto+Kegiatan+1)" alt="Kegiatan Seminar" width="400" height="250" style="border-radius: 5px; border: 1px solid #00f3ff;">
                    <figcaption style="color: #7dd3fc; margin-top: 15px; font-size: 1em;">Menghadiri Seminar Teknologi.</figcaption>
                </figure>

                <figure style="margin: 0; text-align: center; background-color: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; border: 1px solid #1e3a8a; box-shadow: 0 5px 15px rgba(0,0,0,0.5);">
                    <img src="[https://placehold.co/400x250?text=Foto+Kegiatan+2](https://placehold.co/400x250?text=Foto+Kegiatan+2)" alt="Kegiatan Olahraga" width="400" height="250" style="border-radius: 5px; border: 1px solid #00f3ff;">
                    <figcaption style="color: #7dd3fc; margin-top: 15px; font-size: 1em;">Turnamen Futsal Mahasiswa.</figcaption>
                </figure>

            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer style="text-align: center; padding: 20px; background-color: rgba(28, 33, 43, 0.95); border-top: 1px solid rgba(0, 243, 255, 0.1); color: #7dd3fc;">
        <p style="margin: 0;">&copy; 2026 Personal Homepage. Dibuat menggunakan HTML5 & Inline CSS.</p>
    </footer>
